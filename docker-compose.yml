services:
  redis:
    image: redis:7-alpine
    container_name: earthonline-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    restart: always

  mongo:
    image: mongo:6
    container_name: earthonline-mongo
    volumes:
      - mongo_data:/data/db
    restart: always

  backend-asia:
    build: ./backend
    container_name: earthonline-backend-asia
    environment:
      - NODE_ENV=production
      - SERVER_REGION=ASIA
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongo:27017/earthonline
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - JWT_SECRET=${JWT_SECRET:-earth_online_secret_key_9988}
    depends_on:
      - redis
      - mongo
    restart: always

  backend-us:
    build: ./backend
    container_name: earthonline-backend-us
    environment:
      - NODE_ENV=production
      - SERVER_REGION=US
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongo:27017/earthonline
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - JWT_SECRET=${JWT_SECRET:-earth_online_secret_key_9988}
    depends_on:
      - redis
      - mongo
    restart: always

  backend-eu:
    build: ./backend
    container_name: earthonline-backend-eu
    environment:
      - NODE_ENV=production
      - SERVER_REGION=EU
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongo:27017/earthonline
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - JWT_SECRET=${JWT_SECRET:-earth_online_secret_key_9988}
    depends_on:
      - redis
      - mongo
    restart: always

  nginx:
    image: nginx:alpine
    container_name: earthonline-nginx
    ports:
      - "3001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-asia
      - backend-us
      - backend-eu
    restart: always

volumes:
  mongo_data:
