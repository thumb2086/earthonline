name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            backend/package-lock.json

      - name: Backend syntax check
        run: |
          cd backend
          npm install --ignore-scripts
          node --check server.js
          node --check db.js
          node --check routes/leaderboard.js
          node --check routes/global.js
          node --check routes/auth.js
          node --check services/gameLoop.js
          node --check services/chatService.js
          node --check services/socialService.js
          echo "✅ Backend syntax OK"

      - name: Frontend build
        run: |
          cd client
          npm install --legacy-peer-deps
          npm run build
          echo "✅ Frontend build OK"

  electron-builder:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build Electron app
        run: |
          cd client
          npm install --legacy-peer-deps
          npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: EarthOnline-Installer
          path: client/release/*.exe
